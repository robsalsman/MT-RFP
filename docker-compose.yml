services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      - MTRFP_DATA_DIR=/data
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
